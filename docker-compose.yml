services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - backend_workspace_node_modules:/app/backend/node_modules
    ports:
      - '3010:3000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/monorepo
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_workspace_node_modules:/app/frontend/node_modules
    ports:
      - '4200:4200'
    #depends_on:
    #  - backend

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db

volumes:
  backend_node_modules:
  frontend_node_modules:
  backend_workspace_node_modules:
  frontend_workspace_node_modules:
  mongo_data:
