<main class="page-shell">
  <section class="hero">
    <h1>Terminal de Abastecimiento</h1>
    <p>Registra facturas y actualiza costos promedios ponderados (WAC)</p>
  </section>

  <app-wizard-stepper [step]="2"></app-wizard-stepper>

  <app-mock-form-card title="Detalle de Insumo">
    <div class="form-grid">
      <label>Insumo</label>
      <input z-input value="Leche entera" />

      <section class="info-box">
        <small>WAC actual</small>
        <strong>$11.50 / litro</strong>
      </section>

      <div class="two-cols">
        <div>
          <label>Cantidad</label>
          <input z-input value="20" />
        </div>
        <div>
          <label>Precio total</label>
          <input z-input value="240" />
        </div>
      </div>

      <section class="info-box success">
        <small>Precio unitario calculado</small>
        <strong>$12.00 / litro</strong>
      </section>
    </div>

    <div class="actions">
      <a routerLink="/abastecimiento/1" z-button zType="outline">Anterior</a>
      <a routerLink="/abastecimiento/3" z-button>Continuar</a>
    </div>
  </app-mock-form-card>
</main>
