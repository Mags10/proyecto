<main class="page-shell">
  <section class="hero">
    <h1>Panel de Ventas en Piso</h1>
    <p>Sistema rapido de ventas con control de inventario en tiempo real</p>
  </section>

  <section class="section-block">
    <h2>Bebidas</h2>
    <div class="cards-grid">
      <app-product-card name="Cafe Americano" price="$45" stock="25"></app-product-card>
      <app-product-card name="Cafe Latte" price="$65" stock="18"></app-product-card>
      <app-product-card name="Cappuccino" price="$60" stock="22"></app-product-card>
      <app-product-card name="Jugo Natural" price="$35" stock="20"></app-product-card>
    </div>
  </section>

  <section class="section-block">
    <h2>Pasteleria</h2>
    <div class="cards-grid">
      <app-product-card name="Croissant" price="$35" stock="3" [lowStock]="true"></app-product-card>
      <app-product-card name="Pan Chocolate" price="$40" stock="12"></app-product-card>
      <app-product-card name="Muffin Arandano" price="$45" stock="14"></app-product-card>
    </div>
  </section>
</main>
