name: Deploy on self-hosted runner

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-selfhosted
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 0

      - name: Fix workspace ownership
        shell: bash
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" || true
          fi

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail

          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "Docker Compose is not installed on runner"
            exit 1
          fi

          # Deploy backend and frontend so the browser can reach the API through the frontend proxy.
          $DC up -d --build backend frontend
          $DC ps backend frontend

      - name: Health check frontend
        shell: bash
        run: |
          set -euo pipefail

          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "Docker Compose is not installed on runner"
            exit 1
          fi

          frontend_ready=false
          api_ready=false
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:4200/awe/" >/dev/null; then
              frontend_ready=true
            fi
            if curl -fsS "http://127.0.0.1:3010/api/status" >/dev/null; then
              api_ready=true
            fi

            if [[ "$frontend_ready" == true && "$api_ready" == true ]]; then
              echo "Frontend and API are healthy"
              exit 0
            fi

            sleep 2
          done

          echo "Deployment health check failed"
          if [[ "$frontend_ready" != true ]]; then
            echo "Frontend health check failed"
          fi
          if [[ "$api_ready" != true ]]; then
            echo "API health check failed"
          fi
          $DC logs --tail=200 backend frontend || true
          exit 1
