name: Deploy on self-hosted runner

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-selfhosted
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail

          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            echo "Docker Compose is not installed on runner"
            exit 1
          fi

          # Deploy por ahora solo de frontend
          $DC up -d --build frontend
          $DC ps frontend
